<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CutFinder</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash (light = default).
      try {
        document.documentElement.setAttribute(
          'data-theme',
          localStorage.getItem('cutfinder-theme') === 'dark' ? 'dark' : 'light',
        )
      } catch (e) {}
    </script>
  </head>
  <body class="bg-[--bg-canvas] text-[--text-primary]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
